version: 2
updates:
- package-ecosystem: "gradle"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
  groups:
    dependencies:
      applies-to: version-updates
      patterns:
        - "*"

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
  groups:
    dependencies:
      applies-to: version-updates
      patterns:
        - "*"

- package-ecosystem: "npm"
  directory: "/docs"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
  groups:
    dependencies:
      applies-to: version-updates
      patterns:
        - "*"
